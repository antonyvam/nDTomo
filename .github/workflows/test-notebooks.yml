name: Test Jupyter Notebooks

on:
  workflow_dispatch: # Manual trigger button
  pull_request:      # Automated check on PRs
    branches: [ master ]

jobs:
  test-notebooks:
    name: Install and Run Notebook Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      # Replaces actions/setup-python with an isolated conda testing environment
      - name: Set up Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          auto-activate-base: false
          activate-environment: ndtomo-tests

      # Installs astra-toolbox directly using the specified conda channels
      - name: Install Astra Toolbox via Conda
        shell: bash -el {0}
        run: |
          conda install -c astra-toolbox -c nvidia astra-toolbox -y

      # Installs your dependencies and local package into the active environment
      - name: Install nDTomo and test tools
        shell: bash -el {0}
        run: |
          python -m pip install --upgrade pip
          python -m pip install nbconvert ipykernel
          # Installs your specific CUDA-optimized PyTorch binaries
          python -m pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu118
          python -m pip install .

      # Executes the loop within the activated environment shell
      - name: Execute Specific Jupyter Notebooks
        shell: bash -el {0}
        run: |
          # 1. Define the explicit path directory location
          NOTEBOOK_DIR="docs/source/notebooks"
          
          # 2. Add the precise file list inside the array block
          NOTEBOOKS=(
            "tutorial_ct_recon_demo.ipynb"
            "tutorial_sinogram_handling.ipynb"
            "tutorial_segmentation.ipynb"
            "tutorial_registration.ipynb"
            "tutorial_detector_calibration.ipynb"
            "tutorial_dimensionality_reduction.ipynb"
            "tutorial_peak_fitting.ipynb"
          )
          
          # 3. Loop through the chosen sequence array and execute them sequentially
          for nb in "${NOTEBOOKS[@]}"; do
            FILE_PATH="${NOTEBOOK_DIR}/${nb}"
            echo "--------------------------------------------------"
            echo "🚀 Executing notebook: ${FILE_PATH}"
            echo "--------------------------------------------------"
            
            # Runs the individual file execution loop
            jupyter nbconvert --to notebook --execute "${FILE_PATH}"
          done
